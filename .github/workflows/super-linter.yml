name: Lint Code Base

on:
  push:
    branches: [master]
  pull_request:

permissions: {}

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so super-linter can diff against the base branch

      - name: Super-linter
        uses: super-linter/super-linter@v7
        env:
          DEFAULT_BRANCH: master   # scriptlab uses "master", not "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Only lint changed files on PRs; full repo scan on push to master
          VALIDATE_ALL_CODEBASE: false

          # --- Languages actually present in scriptlab ---
          VALIDATE_POWERSHELL: true        # .ps1 files (basiceq.ps1, gn.ps1, profiles)
          VALIDATE_PYTHON_RUFF: true       # ccprep.py, slpgen.py
          VALIDATE_JAVASCRIPT_ES: true     # ai103_readiness_v2.jsx
          VALIDATE_JSON: true              # AZ-900_glossary.json, MS-102_glossary.json, etc.
          VALIDATE_MARKDOWN: true          # README.md, slpgen_UML.md, markusevangeliet.md

          # --- Not present / not useful here ---
          VALIDATE_YAML: false
          VALIDATE_HTML: false
          VALIDATE_CSS: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_DOCKERFILE_HADOLINT: false
          VALIDATE_BASH: false

          # Optional: post lint results as a PR comment
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: true

          # Skip PDFs, images, .ipynb notebooks, CSVs — none of these are linted anyway,
          # but excluding them keeps the file-discovery step faster
          FILTER_REGEX_EXCLUDE: '.*\.(pdf|jpg|jpeg|svg|csv|ipynb)$'
